<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Roche — Purchasing System</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500;600&family=Great+Vibes&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════ */
    :root {
      --bg:#0b1420; --bg2:#111c2e; --bg3:#0d1929; --bgh:#090e1a;
      --bdr:rgba(148,163,184,.14); --bdf:#6b9e3a;
      --acc:#6b9e3a; --acc-d:#4a7028; --acc-l:rgba(107,158,58,.12);
      --txt:#e8edf4; --txt2:#94a3b8; --txt3:rgba(148,163,184,.4);
      --red:#ef4444; --red-bg:rgba(239,68,68,.08);
      --r:8px; --r2:14px; --r3:20px; --r4:28px;
      --sh:0 4px 24px rgba(0,0,0,.35); --tr:.2s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;font-family:inherit}
    input,textarea,select{font-family:inherit}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:rgba(107,158,58,.3);border-radius:3px}

    /* ═══════════════════════════════════════
       LOGIN / DENIED SCREENS
    ═══════════════════════════════════════ */
    .auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:999}
    .auth-box{text-align:center;max-width:420px;width:100%}
    .auth-logo{width:108px;height:108px;border-radius:50%;border:2px solid rgba(107,158,58,.38);background:rgba(107,158,58,.04);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 24px;box-shadow:0 0 40px rgba(107,158,58,.12)}
    .auth-logo img{width:86px;height:86px;object-fit:contain}
    .auth-title{font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;letter-spacing:4px;color:#fff;margin-bottom:6px}
    .auth-title b{font-weight:700;color:var(--acc)}
    .auth-sub{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--acc);margin-bottom:40px}
    .btn-google{display:inline-flex;align-items:center;justify-content:center;gap:12px;padding:14px 32px;background:#fff;color:#3c4043;border:none;border-radius:var(--r2);font-size:15px;font-weight:500;cursor:pointer;transition:all var(--tr);width:100%;max-width:300px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .btn-google:hover{background:#f8f8f8;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
    .btn-google svg{flex-shrink:0}
    .auth-note{font-size:11px;color:var(--txt3);margin-top:16px;letter-spacing:1px}
    .denied-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);padding:32px;margin-top:24px;text-align:left}
    .denied-icon{font-size:44px;text-align:center;margin-bottom:14px}
    .denied-title{font-size:18px;font-weight:600;color:#fff;text-align:center;margin-bottom:10px}
    .denied-msg{font-size:13px;color:var(--txt2);line-height:1.7;text-align:center}
    .denied-email{background:rgba(107,158,58,.07);border:1px solid rgba(107,158,58,.2);border-radius:var(--r);padding:8px 14px;font-size:12px;color:var(--acc);margin-top:12px;text-align:center;word-break:break-all}
    .btn-out{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt2);font-size:13px;cursor:pointer;transition:all var(--tr);margin:20px auto 0;width:fit-content}
    .btn-out:hover{color:#fff;border-color:rgba(255,255,255,.2)}

    /* ═══════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════ */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(11,20,32,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);height:62px}
    .nav-inner{max-width:1440px;margin:0 auto;height:100%;padding:0 20px;display:flex;align-items:center;gap:12px}
    .nav-brand{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0;user-select:none}
    .nav-logo{width:44px;height:44px;border-radius:50%;border:2px solid rgba(107,158,58,.38);background:#fff;padding:2px;object-fit:contain;transition:transform var(--tr),box-shadow var(--tr)}
    .nav-brand:hover .nav-logo{transform:scale(1.07);box-shadow:0 0 14px rgba(107,158,58,.28)}
    .nav-brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff}
    .nav-brand-name b{color:var(--acc)}
    .nav-brand-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--txt2)}
    .nav-links{display:flex;align-items:center;gap:2px;margin-left:14px;flex:1}
    .nb{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);border:1px solid transparent;background:transparent;color:var(--txt2);font-size:13px;font-weight:500;transition:all var(--tr);white-space:nowrap}
    .nb svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .nb:hover{color:#fff;background:rgba(255,255,255,.06)}
    .nb.active{color:#fff;background:var(--acc-l);border-color:rgba(107,158,58,.28)}
    .nav-user{margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:8px;background:var(--acc-l);border:1px solid rgba(107,158,58,.22);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--acc);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nav-user img{width:22px;height:22px;border-radius:50%;flex-shrink:0}
    .nav-ham{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:6px;margin-left:8px}
    .nav-ham span{display:block;width:22px;height:2px;background:var(--txt2);border-radius:2px;transition:all var(--tr)}

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    main{max-width:1440px;margin:0 auto;padding:32px 24px 72px}
    .ph h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:#fff;line-height:1.1}
    .ph .ps{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--acc);margin-top:4px}
    .pt{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px}
    .card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);padding:28px;box-shadow:var(--sh)}
    .sl{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--acc);border-bottom:1px solid var(--bdr);padding-bottom:8px;margin-bottom:18px}

    /* ═══════════════════════════════════════
       HOME
    ═══════════════════════════════════════ */
    .hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:44px 0 36px;gap:18px}
    .hero-logo{width:116px;height:116px;border-radius:50%;border:2px solid rgba(107,158,58,.38);background:rgba(107,158,58,.04);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 40px rgba(107,158,58,.12)}
    .hero-logo img{width:92px;height:92px;object-fit:contain}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;letter-spacing:4px;color:#fff}
    .hero h1 strong{font-weight:700;color:var(--acc)}
    .pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .pill{background:var(--acc-l);border:1px solid rgba(107,158,58,.22);border-radius:100px;padding:5px 14px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:6px}
    .pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc)}
    .hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px}
    .hc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);padding:26px 22px;cursor:pointer;transition:all var(--tr);text-align:left}
    .hc:hover{border-color:rgba(107,158,58,.35);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.28)}
    .hc-ico{width:46px;height:46px;background:var(--acc-l);border:1px solid rgba(107,158,58,.22);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
    .hc-t{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:#fff}
    .hc-d{font-size:12px;color:var(--txt2);margin-top:3px}
    .stats{display:flex;gap:52px;justify-content:center;flex-wrap:wrap}
    .st .n{font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:600;color:#fff;line-height:1}
    .st .l{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);margin-top:4px;text-align:center}

    /* ═══════════════════════════════════════
       FORM
    ═══════════════════════════════════════ */
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:20px 26px}
    .ff{grid-column:1/-1}
    .fi{display:flex;flex-direction:column;gap:8px}
    .fi label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--acc)}
    .fi input,.fi textarea,.fi select{background:var(--bg3);border:1px solid rgba(148,163,184,.18);border-radius:var(--r);padding:11px 14px;font-size:14px;color:#fff;outline:none;transition:border-color var(--tr),box-shadow var(--tr);width:100%}
    .fi textarea{resize:vertical;min-height:78px}
    .fi input:focus,.fi textarea:focus,.fi select:focus{border-color:var(--bdf);box-shadow:0 0 0 3px rgba(107,158,58,.1)}
    .fi input::placeholder,.fi textarea::placeholder{color:var(--txt3)}
    .fi select option{background:#1a2a1a}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
    /* Detail rows */
    .dt-wrap{border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden}
    .dtt{width:100%;border-collapse:collapse}
    .dtt th{background:var(--bgh);padding:9px 11px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);text-align:left}
    .dtt td{padding:5px 7px;border-top:1px solid var(--bdr);vertical-align:middle}
    .dt-in{background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 8px;font-size:13px;color:#fff;outline:none;width:100%;transition:all var(--tr)}
    .dt-in:hover{background:rgba(107,158,58,.06);border-color:rgba(107,158,58,.2)}
    .dt-in:focus{background:var(--bg3);border-color:var(--bdf)}
    .dt-in::placeholder{color:var(--txt3);font-size:12px}
    .add-row-bar{display:flex;align-items:center;padding:9px 11px;background:rgba(107,158,58,.03);border-top:1px solid var(--bdr)}

    /* ═══════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════ */
    .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,var(--acc),var(--acc-d));color:#fff;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:3px;border:none;border-radius:var(--r2);transition:all var(--tr);width:100%}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(107,158,58,.28)}
    .bs{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:transparent;border:1px solid rgba(148,163,184,.22);border-radius:var(--r);color:var(--txt2);font-size:12px;font-weight:500;transition:all var(--tr);white-space:nowrap}
    .bs:hover{color:#fff;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2)}
    .bg{background:var(--acc)!important;border-color:var(--acc)!important;color:#fff!important}
    .bg:hover{background:var(--acc-d)!important;border-color:var(--acc-d)!important}
    .bd{border-color:rgba(239,68,68,.22)!important;color:rgba(239,68,68,.5)!important}
    .bd:hover{background:var(--red-bg)!important;color:var(--red)!important;border-color:rgba(239,68,68,.45)!important}
    .bi{width:30px;height:30px;padding:0;justify-content:center}
    .bar-add{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;background:var(--acc-l);border:1px solid rgba(107,158,58,.22);border-radius:100px;color:var(--acc);font-size:12px;font-weight:600;transition:all var(--tr)}
    .bar-add:hover{background:rgba(107,158,58,.2)}
    .brm{width:27px;height:27px;background:var(--red-bg);border:1px solid rgba(239,68,68,.17);border-radius:6px;color:rgba(239,68,68,.5);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr)}
    .brm:hover{color:var(--red);background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.4)}
    .brow{display:flex;align-items:center;flex-wrap:wrap;gap:8px}

    /* ═══════════════════════════════════════
       TABLE
    ═══════════════════════════════════════ */
    .tw{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh)}
    .ts{overflow-x:auto}
    .dt2{width:100%;border-collapse:collapse;min-width:880px}
    .dt2 thead tr{background:var(--bgh);border-bottom:1px solid var(--bdr)}
    .dt2 th{padding:11px 13px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);text-align:left;white-space:nowrap}
    .dt2 tbody tr{border-bottom:1px solid rgba(148,163,184,.06);transition:background var(--tr)}
    .dt2 tbody tr:last-child{border-bottom:none}
    .dt2 tbody tr:hover{background:rgba(148,163,184,.02)}
    .dt2 td{padding:8px 13px;font-size:13px;color:var(--txt2);vertical-align:middle}
    .ci{background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 7px;font-family:'Jost',sans-serif;font-size:13px;color:#fff;outline:none;width:100%;transition:all var(--tr)}
    .ci:hover{background:rgba(107,158,58,.06);border-color:rgba(107,158,58,.2)}
    .ci:focus{background:var(--bg3);border-color:var(--bdf)}
    .sbg{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:100px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all var(--tr);border:1px solid;white-space:nowrap}
    .s-del{background:rgba(107,158,58,.14);color:var(--acc);border-color:rgba(107,158,58,.28)}
    .s-pen{background:rgba(148,163,184,.05);color:var(--txt3);border-color:rgba(148,163,184,.1)}
    .s-del:hover{background:rgba(107,158,58,.24)}
    .s-pen:hover{background:rgba(148,163,184,.1);color:var(--acc)}
    .empty{text-align:center;padding:64px 24px;color:var(--txt3)}
    .empty-ico{font-size:52px;margin-bottom:12px;opacity:.5}
    .empty p{font-style:italic;font-size:14px}

    /* Filter bar */
    .fbar{display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
    .fg2{display:flex;background:rgba(148,163,184,.04);border:1px solid var(--bdr);border-radius:var(--r2);padding:3px;gap:2px}
    .ft{padding:6px 15px;border-radius:var(--r);border:none;background:transparent;color:rgba(148,163,184,.5);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all var(--tr)}
    .ft:hover{color:#fff}
    .ft.active{background:#1e3050;color:#fff}
    .sf{position:relative;flex:1;max-width:380px}
    .sf svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}
    .si{width:100%;padding:9px 13px 9px 37px;background:rgba(148,163,184,.07);border:1px solid var(--bdr);border-radius:var(--r2);font-size:13px;color:#fff;outline:none;transition:border-color var(--tr)}
    .si:focus{border-color:var(--bdf)}
    .si::placeholder{color:var(--txt3)}

    /* ═══════════════════════════════════════
       TOTALS
    ═══════════════════════════════════════ */
    .totcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);padding:22px 26px;min-width:290px}
    .trow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
    .tlbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);font-family:'Cormorant Garamond',serif;font-weight:600}
    .tdiv{border-top:1px solid var(--bdr);margin:8px 0}
    .tgrand{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:700;color:#fff}
    .tog{position:relative;width:42px;height:23px;display:inline-block}
    .tog input{opacity:0;width:0;height:0}
    .tog-t{position:absolute;inset:0;background:rgba(148,163,184,.15);border-radius:100px;cursor:pointer;transition:background var(--tr)}
    .tog-t::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:var(--txt2);border-radius:50%;transition:transform var(--tr),background var(--tr)}
    .tog input:checked+.tog-t{background:var(--acc)}
    .tog input:checked+.tog-t::before{transform:translateX(19px);background:#fff}

    /* ═══════════════════════════════════════
       MODAL
    ═══════════════════════════════════════ */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;padding:16px}
    .modal-bg.open{display:flex}
    .modal-box{background:var(--bg2);border:1px solid rgba(148,163,184,.2);border-radius:var(--r4);width:100%;max-width:740px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:mi .22s ease}
    @keyframes mi{from{opacity:0;transform:scale(.96) translateY(8px)}}
    .modal-hd{padding:18px 22px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .modal-hd h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff}
    .modal-x{width:30px;height:30px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt2);font-size:14px;transition:all var(--tr)}
    .modal-x:hover{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.3)}
    .modal-bd{padding:20px 22px;overflow-y:auto;flex:1}

    /* ═══════════════════════════════════════
       TOASTS + LOADER
    ═══════════════════════════════════════ */
    #toasts{position:fixed;bottom:26px;right:26px;z-index:500;display:flex;flex-direction:column;gap:9px}
    .toast{display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:var(--r2);border:1px solid;font-size:13px;font-weight:600;color:#fff;min-width:250px;animation:ti .28s ease;box-shadow:0 8px 24px rgba(0,0,0,.3)}
    @keyframes ti{from{opacity:0;transform:translateY(7px)}}
    .t-ok{background:rgba(18,38,14,.97);border-color:rgba(107,158,58,.32)}
    .t-er{background:rgba(55,10,10,.97);border-color:rgba(239,68,68,.32)}
    .t-inf{background:rgba(14,28,50,.97);border-color:rgba(59,130,246,.32)}
    .ldr{position:fixed;inset:0;background:rgba(11,20,32,.82);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .ldr-spin{width:46px;height:46px;border:3px solid rgba(107,158,58,.18);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ldr-t{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--acc)}

    /* ═══════════════════════════════════════
       RECEIPT
    ═══════════════════════════════════════ */
    .rcp{background:#fff;color:#1a1a1a;padding:44px 50px;border-radius:var(--r2);font-family:'Tajawal',sans-serif;direction:rtl;max-width:760px;margin:0 auto}
    .rcp-top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid #1a1a1a;padding-bottom:18px;margin-bottom:20px}
    .rcp-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#1a1a1a}
    .rcp-contact{font-size:11px;color:#555;line-height:1.8;direction:ltr;text-align:right}
    .rcp-title{text-align:center;font-size:28px;font-weight:700;text-decoration:underline;text-underline-offset:6px;margin-bottom:20px;color:#1a1a1a;letter-spacing:1px}
    .rcp-grid{display:grid;grid-template-columns:185px 1fr;border:2px solid #1a1a1a;margin-bottom:12px}
    .rcp-lbl{background:#f3f4f6;font-weight:700;padding:10px 13px;border-left:2px solid #1a1a1a;border-bottom:1px solid #ddd;font-size:13px;color:#1a1a1a}
    .rcp-lbl:last-of-type{border-bottom:none}

<!-- ══════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════ -->
<script>
'use strict';

// ════════════════════════════════════════════════
//  ⚙️  CONFIG  ← EDIT THESE BEFORE DEPLOYING
// ════════════════════════════════════════════════
const CONFIG = {
  // From Google Cloud Console → Credentials → OAuth 2.0 Client ID
  CLIENT_ID: 'PASTE_YOUR_CLIENT_ID_HERE.apps.googleusercontent.com',

  // Your Google Sheet ID (already filled in)
  SHEET_ID: '1bMUvqHegToeeb3scRAs31Cjod5nJFwUoWkWhPN24Pow',

  // Emails allowed to sign in. Leave [] to allow any Google account
  // that also has edit access to the sheet in Google Drive.
  ALLOWED_EMAILS: [
    'beshoy@gmail.com',   // ← replace with real emails
  ],
};

// Sheet tab names
const SH = { ORDERS:'Orders', BUDGET:'Budget' };

// Column indices (0-based) for Orders sheet
const OC = { ID:0,SO:1,ODATE:2,DDATE:3,SUP:4,FAB:5,QTY:6,SELL:7,BUY:8,DET:9,NOTES:10,STATUS:11,FACDATE:12,CREATED:13 };

// Column indices for Budget sheet
const BC = { ID:0,SO:1,DATE:2,FAB:3,QTY:4,BUY:5,TOTAL:6,SUP:7,NOTES:8,CREATED:9 };


// ════════════════════════════════════════════════
//  AUTH  (Google Identity Services)
// ════════════════════════════════════════════════
const Auth = {
  token : null,
  expiry: 0,
  user  : null,
  client: null,

  init() {
    // GIS loads async — poll until ready
    const t = setInterval(() => {
      if (window.google?.accounts?.oauth2) {
        clearInterval(t);
        this.client = google.accounts.oauth2.initTokenClient({
          client_id: CONFIG.CLIENT_ID,
          scope: [
            'https://www.googleapis.com/auth/spreadsheets',
            'https://www.googleapis.com/auth/userinfo.email',
            'https://www.googleapis.com/auth/userinfo.profile',
          ].join(' '),
          callback: r => this._onToken(r),
        });
      }
    }, 100);
  },

  signIn() {
    if (!this.client) { Toast.err('Auth not ready, try again in a moment.'); return; }
    this.client.requestAccessToken({ prompt: 'select_account' });
  },

  async _onToken(resp) {
    if (resp.error) { Toast.err('Sign-in failed: ' + resp.error); return; }
    this.token  = resp.access_token;
    this.expiry = Date.now() + (resp.expires_in - 60) * 1000;

    Ldr.show('Verifying…');
    try {
      // Fetch user profile
      const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + this.token }
      }).then(r => r.json());
      this.user = { email: info.email, name: info.name, picture: info.picture };

      // Email whitelist check (if list is non-empty)
      if (CONFIG.ALLOWED_EMAILS.length > 0) {
        const ok = CONFIG.ALLOWED_EMAILS.some(e => e.toLowerCase() === info.email.toLowerCase());
        if (!ok) { Ldr.hide(); showScreen('denied'); return; }
      }

      await App.init();
    } catch(e) {
      Ldr.hide();
      if (e.message?.includes('403') || e.message?.includes('401')) showScreen('denied');
      else Toast.err('Error: ' + e.message);
    }
  },

  // Ensure a valid token, silently refreshing if expired
  async ensure() {
    if (this.token && Date.now() < this.expiry) return this.token;
    return new Promise(res => {
      const orig = this.client.callback;
      this.client.callback = r => {
        this.client.callback = orig;
        if (!r.error) {
          this.token  = r.access_token;
          this.expiry = Date.now() + (r.expires_in - 60) * 1000;
        }
        res(this.token);
      };
      this.client.requestAccessToken({ prompt: '' });
    });
  },

  signOut() {
    if (this.token) google.accounts.oauth2.revoke(this.token, () => {});
    this.token = null; this.user = null; this.expiry = 0;
    location.reload();
  },
};


// ════════════════════════════════════════════════
//  SHEETS API  (direct REST calls with fetch)
// ════════════════════════════════════════════════
const Sheets = {
  base: 'https://sheets.googleapis.com/v4/spreadsheets',
  _ids: {},   // cache of sheet name → numeric sheetId

  async _f(url, opts = {}) {
    const token = await Auth.ensure();
    const res = await fetch(url, {
      ...opts,
      headers: {
        Authorization: 'Bearer ' + token,
        ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
      },
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || 'HTTP ' + res.status);
    }
    return res.json();
  },

  async read(sheet) {
    const d = await this._f(`${this.base}/${CONFIG.SHEET_ID}/values/${enc(sheet)}`);
    return d.values || [];
  },

  async append(sheet, rows) {
    return this._f(
      `${this.base}/${CONFIG.SHEET_ID}/values/${enc(sheet)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
      { method:'POST', body: JSON.stringify({ values: rows }) }
    );
  },

  async updateRange(range, rows) {
    return this._f(
      `${this.base}/${CONFIG.SHEET_ID}/values/${enc(range)}?valueInputOption=RAW`,
      { method:'PUT', body: JSON.stringify({ values: rows }) }
    );
  },

  async clearRange(range) {
    return this._f(
      `${this.base}/${CONFIG.SHEET_ID}/values/${enc(range)}:clear`,
      { method:'POST', body: '{}' }
    );
  },

  async deleteRow(sheetName, rowIdx0) {
    // rowIdx0 is 0-based index including header (0=header, 1=first data row, …)
    const sid = await this._sheetId(sheetName);
    return this._f(`${this.base}/${CONFIG.SHEET_ID}:batchUpdate`, {
      method: 'POST',
      body: JSON.stringify({ requests: [{
        deleteDimension: { range: { sheetId: sid, dimension:'ROWS', startIndex: rowIdx0, endIndex: rowIdx0+1 } }
      }] }),
    });
  },

  async _sheetId(name) {
    if (this._ids[name] != null) return this._ids[name];
    const d = await this._f(`${this.base}/${CONFIG.SHEET_ID}?fields=sheets.properties`);
    d.sheets.forEach(s => { this._ids[s.properties.title] = s.properties.sheetId; });
    return this._ids[name];
  },

  // Create Orders + Budget tabs if they don't exist yet
  async ensureTabs() {
    const d = await this._f(`${this.base}/${CONFIG.SHEET_ID}?fields=sheets.properties`);
    const have = d.sheets.map(s => s.properties.title);
    d.sheets.forEach(s => { this._ids[s.properties.title] = s.properties.sheetId; });

    const toAdd = [SH.ORDERS, SH.BUDGET].filter(n => !have.includes(n));
    if (!toAdd.length) return;

    await this._f(`${this.base}/${CONFIG.SHEET_ID}:batchUpdate`, {
      method: 'POST',
      body: JSON.stringify({ requests: toAdd.map(t => ({ addSheet: { properties:{ title:t } } })) }),
    });

    if (!have.includes(SH.ORDERS))
      await this.append(SH.ORDERS, [['ID','S.O No','Order Date','Delivery Date','Supplier','Fabric Code','Qty (m)','Sell/m','Buy/m','Details (JSON)','Notes','Status','Factory Date','Created At']]);
    if (!have.includes(SH.BUDGET))
      await this.append(SH.BUDGET, [['ID','S.O No','Date','Fabric Code','Qty (m)','Buy/m','Total','Supplier','Notes','Created At']]);
  },
};

function enc(s) { return encodeURIComponent(s); }


// ════════════════════════════════════════════════
//  DATA LAYER
// ════════════════════════════════════════════════
const Data = {
  orders: [],
  budget: [],

  _toOrder(row, rowIdx) {
    let details = [];
    try { details = JSON.parse(row[OC.DET] || '[]'); } catch(_) {}
    return {
      _row     : rowIdx,   // 0-based index in values[] including header row
      id       : row[OC.ID]||'',      soNo    : row[OC.SO]||'',
      orderDate: row[OC.ODATE]||'',   delDate : row[OC.DDATE]||'',
      supplier : row[OC.SUP]||'',     fabCode : row[OC.FAB]||'',
      qty      : row[OC.QTY]||'',     sellPrice: row[OC.SELL]||'',
      buyPrice : row[OC.BUY]||'',
      details, notes: row[OC.NOTES]||'',
      status   : row[OC.STATUS]||'Pending',
      facDate  : row[OC.FACDATE]||'', createdAt: row[OC.CREATED]||'',
    };
  },

  _fromOrder(o) {
    return [
      o.id, o.soNo, o.orderDate, o.delDate, o.supplier, o.fabCode,
      o.qty, o.sellPrice, o.buyPrice, JSON.stringify(o.details||[]),
      o.notes, o.status, o.facDate, o.createdAt,
    ];
  },

  _toBudget(row, rowIdx) {
    return {
      _row    : rowIdx,
      id      : row[BC.ID]||'',   soNo    : row[BC.SO]||'',
      date    : row[BC.DATE]||'', fabCode : row[BC.FAB]||'',
      qty     : row[BC.QTY]||'', buyPrice: row[BC.BUY]||'',
      total   : row[BC.TOTAL]||'', supplier: row[BC.SUP]||'',
      notes   : row[BC.NOTES]||'',
    };
  },

  async loadAll() {
    const [oVals, bVals] = await Promise.all([
      Sheets.read(SH.ORDERS), Sheets.read(SH.BUDGET),
    ]);
    // values[0] = header (rowIdx=0), data starts at rowIdx=1
    this.orders = oVals.length > 1 ? oVals.slice(1).map((r,i) => this._toOrder(r, i+1)) : [];
    this.budget = bVals.length > 1 ? bVals.slice(1).map((r,i) => this._toBudget(r, i+1)) : [];
  },

  _id() { return Date.now() + '_' + Math.random().toString(36).slice(2,6); },

  async addOrder(o) {
    o.id = this._id();
    o.createdAt = today();
    o.status = 'Pending';
    o.facDate = '';
    await Sheets.append(SH.ORDERS, [this._fromOrder(o)]);
    await this.loadAll();
  },

  async updateCell(o, field, value) {
    const colLetter = { soNo:'B', orderDate:'C', delDate:'D', supplier:'E', fabCode:'F',
      qty:'G', sellPrice:'H', buyPrice:'I', details:'J', notes:'K', status:'L', facDate:'M' }[field];
    if (!colLetter) return;
    const sheetRow = o._row + 1;  // convert 0-based idx to 1-based sheet row
    await Sheets.updateRange(`${SH.ORDERS}!${colLetter}${sheetRow}`,
      [[field === 'details' ? JSON.stringify(value) : value]]);
    // optimistic local update
    const local = this.orders.find(x => x.id === o.id);
    if (local) local[field] = value;
  },

  async markDelivered(o) {
    const d = today();
    const row = o._row + 1;
    await Sheets.updateRange(`${SH.ORDERS}!L${row}:M${row}`, [['Delivered', d]]);
    o.status = 'Delivered'; o.facDate = d;
    await this.loadAll();
  },

  async deleteOrder(o) {
    await Sheets.deleteRow(SH.ORDERS, o._row);
    await this.loadAll();
  },

  async addBudget(item) {
    item.id    = this._id();
    item.total = ((+item.qty||0) * (+item.buyPrice||0)).toFixed(2);
    item.createdAt = today();
    await Sheets.append(SH.BUDGET, [[
      item.id, item.soNo, item.date, item.fabCode,
      item.qty, item.buyPrice, item.total,
      item.supplier, item.notes, item.createdAt,
    ]]);
    await this.loadAll();
  },

  async deleteBudget(item) {
    await Sheets.deleteRow(SH.BUDGET, item._row);
    await this.loadAll();
  },

  async clearBudget() {
    // Delete rows bottom-up to keep indices valid
    const sorted = [...this.budget].sort((a,b) => b._row - a._row);
    for (const i of sorted) await Sheets.deleteRow(SH.BUDGET, i._row);
    this.budget = [];
  },
};


// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
const U = {
  e  : s => String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'),
  fmt: (n,d=2) => Number(n||0).toLocaleString('en-EG',{minimumFractionDigits:d,maximumFractionDigits:d}),
  $  : id => document.getElementById(id),
  val: id => (document.getElementById(id)?.value||'').trim(),
  uid: () => Date.now()+'_'+Math.random().toString(36).slice(2,6),
  clone: o => JSON.parse(JSON.stringify(o)),
};

function today() { return new Date().toISOString().split('T')[0]; }

const Ldr = {
  show(m='Loading…') {
    let el = U.$('ldr');
    if (!el) { el=document.createElement('div'); el.id='ldr'; el.className='ldr';
      el.innerHTML=`<div class="ldr-spin"></div><div class="ldr-t">${m}</div>`;
      document.body.appendChild(el); }
    else el.querySelector('.ldr-t').textContent = m;
  },
  hide() { U.$('ldr')?.remove(); },
};

const Toast = {
  show(m,t='ok',d=3400) {
    const el = document.createElement('div');
    el.className = 'toast t-'+t;
    el.textContent = ({ok:'✓',er:'⚠',inf:'ℹ'}[t]||'') + ' ' + m;
    U.$('toasts').appendChild(el);
    setTimeout(() => el.remove(), d);
  },
  ok (m) { this.show(m,'ok');  },
  err(m) { this.show(m,'er');  },
  inf(m) { this.show(m,'inf'); },
};

function openModal(title, html, wide) {
  U.$('modal-title').textContent = title;
  U.$('modal-bd').innerHTML = html;
  if (wide) U.$('modal-box').style.maxWidth = wide;
  U.$('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === U.$('modal-bg')) {
    U.$('modal-bg').classList.remove('open');
    U.$('modal-box').style.maxWidth = '';
  }
}

function showScreen(name) {
  ['login-screen','app-shell','denied-screen'].forEach(id => {
    const el = U.$(id); if (el) el.style.display = 'none';
  });
  if (name === 'login')  { U.$('login-screen').style.display = 'flex'; }
  if (name === 'app')    { U.$('app-shell').style.display = 'block'; }
  if (name === 'denied') {
    U.$('denied-screen').style.display = 'flex';
    const em = U.$('denied-email'); if (em && Auth.user) em.textContent = Auth.user.email;
    const msg = U.$('denied-msg');
    if (msg) msg.textContent = 'Your Google account does not have permission to access this system. Contact the owner to request access.';
  }
}


// ════════════════════════════════════════════════
//  DETAIL ROWS  (dynamic order-item table)
// ════════════════════════════════════════════════
const DR = {
  rows: [],
  init(ex=[]) { this.rows = ex.length ? U.clone(ex) : [this._new()]; },
  _new() { return { id:U.uid(), item:'', qty:'', unit:'م', price:'', total:'' }; },
  add()  { this.rows.push(this._new()); this.render(); },
  rm(id) {
    if (this.rows.length === 1) { Toast.inf('At least one row required.'); return; }
    this.rows = this.rows.filter(r => r.id !== id); this.render();
  },
  upd(id,f,v) {
    const r = this.rows.find(x => x.id === id); if (!r) return;
    r[f] = v;
    if (f==='qty'||f==='price') {
      const q=parseFloat(r.qty)||0, p=parseFloat(r.price)||0;
      r.total = q&&p ? (q*p).toFixed(2) : '';
      const el = document.querySelector(`[data-rt="${id}"]`);
      if (el) el.value = r.total;
    }
  },
  get() { return U.clone(this.rows); },
  render() {
    const tb = U.$('dt-tbody'); if (!tb) return;
    tb.innerHTML = this.rows.map(r => `
    <tr>
      <td><input class="dt-in" value="${U.e(r.item)}" placeholder="Item / description" oninput="DR.upd('${r.id}','item',this.value)"></td>
      <td><input class="dt-in" type="number" value="${U.e(r.qty)}" placeholder="0" min="0" style="width:68px" oninput="DR.upd('${r.id}','qty',this.value)"></td>
      <td><input class="dt-in" value="${U.e(r.unit)}" placeholder="م" style="width:46px" oninput="DR.upd('${r.id}','unit',this.value)"></td>
      <td><input class="dt-in" type="number" value="${U.e(r.price)}" placeholder="0.00" step="0.01" style="width:82px" oninput="DR.upd('${r.id}','price',this.value)"></td>
      <td><input class="dt-in" value="${U.e(r.total)}" readonly data-rt="${r.id}" style="width:82px;color:#6b9e3a;font-weight:600" placeholder="—"></td>
      <td style="width:34px"><button class="brm" onclick="DR.rm('${r.id}')">✕</button></td>
    </tr>`).join('');
  },
};

<div class="tr2"><span class="tg">Grand Total</span><span class="tg" style="font-family:'Courier New'">${U.fmt(grand)} EGP</span></div>
</div></div>
<div class="ft">La Roche Furniture &nbsp;|&nbsp; Beshoy Karam</div>
<script>window.onload=function(){window.print();window.onafterprint=function(){window.close()}};<\/script>
</body></html>`;
  },
};


// ════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════
const A = {
  async addOrder() {
    const soNo=U.val('f-so'), fabCode=U.val('f-fc'), qty=parseFloat(U.val('f-qty'));
    if (!soNo)    { Toast.err('S.O No is required.');        return; }
    if (!fabCode) { Toast.err('Fabric Code is required.');   return; }
    if (!qty||qty<=0) { Toast.err('Quantity must be > 0.'); return; }
    Ldr.show('Saving to sheet…');
    try {
      await Data.addOrder({ soNo, orderDate:U.val('f-od'), delDate:U.val('f-dd'),
        supplier:U.val('f-sup'), fabCode, qty, sellPrice:parseFloat(U.val('f-sell'))||0,
        buyPrice:parseFloat(U.val('f-buy'))||0, details:DR.get(), notes:U.val('f-notes') });
      Toast.ok('Order saved!'); App.go('follow');
    } catch(e) { Toast.err(e.message); } finally { Ldr.hide(); }
  },

  async uc(id, field, value) {   // inline cell update
    const o = Data.orders.find(x => x.id===id);
    if (!o || String(o[field])===String(value)) return;
    try { await Data.updateCell(o, field, value); }
    catch(e) { Toast.err('Save failed: '+e.message); }
  },

  toggleStatus(id) {
    const o = Data.orders.find(x=>x.id===id); if (!o) return;
    const verb = o.status==='Delivered' ? 'Revert to Pending?' : 'Mark as Delivered?';
    const action = o.status==='Delivered' ? `A._revert('${id}')` : `A._deliver('${id}')`;
    const btnLabel = o.status==='Delivered' ? 'Revert' : 'Confirm';
    openModal(verb, `
      <p style="color:var(--txt2);margin-bottom:18px">
        ${o.status==='Delivered'?'Revert':'Mark'} <strong style="color:#fff">S.O ${U.e(o.soNo)}</strong>?
      </p>
      <div class="brow">
        <button class="bs" onclick="closeModal()">Cancel</button>
        <button class="bs bg" onclick="${action}">${btnLabel}</button>
      </div>`);
  },

  async _deliver(id) {
    closeModal(); Ldr.show('Updating…');
    try {
      const o=Data.orders.find(x=>x.id===id); if(!o)return;
      await Data.markDelivered(o);
      Toast.ok('Marked as Delivered!'); P.follow(U.$('main'));
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  async _revert(id) {
    closeModal(); Ldr.show('Updating…');
    try {
      const o=Data.orders.find(x=>x.id===id); if(!o)return;
      await Data.updateCell(o,'status','Pending');
      await Data.updateCell(o,'facDate','');
      Toast.inf('Reverted to Pending.'); P.follow(U.$('main'));
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  delOrder(id) {
    const o=Data.orders.find(x=>x.id===id); if(!o)return;
    openModal('Delete Order?', `
      <p style="color:var(--txt2);margin-bottom:18px">Permanently delete <strong style="color:#fff">S.O ${U.e(o.soNo)}</strong>?</p>
      <div class="brow">
        <button class="bs" onclick="closeModal()">Cancel</button>
        <button class="bs bd" style="color:var(--red)" onclick="A._delOrder('${id}')">Delete</button>
      </div>`);
  },
  async _delOrder(id) {
    closeModal(); Ldr.show('Deleting…');
    try {
      const o=Data.orders.find(x=>x.id===id); if(!o)return;
      await Data.deleteOrder(o);
      Toast.ok('Deleted.'); P.follow(U.$('main'));
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  async addToBudget(id) {
    const o=Data.orders.find(x=>x.id===id); if(!o)return;
    Ldr.show('Adding…');
    try {
      await Data.addBudget({soNo:o.soNo,date:o.orderDate||today(),fabCode:o.fabCode,qty:o.qty,buyPrice:o.buyPrice,supplier:o.supplier,notes:o.notes||''});
      Toast.ok('Added to Budget!');
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  copyTable() {
    const hd=['S.O No','Order Date','Del Date','Supplier','Fabric Code','Qty','Status'];
    const rs=Data.orders.map(o=>[o.soNo,o.orderDate,o.delDate,o.supplier,o.fabCode,o.qty,o.status].join('\t'));
    navigator.clipboard.writeText([hd.join('\t'),...rs].join('\n')).then(()=>Toast.ok('Copied!')).catch(()=>Toast.err('Copy failed'));
  },

  facSearch() {
    const q=(U.$('fac-q')?.value||UI.fq||'').trim();
    if(!q){Toast.inf('Enter an S.O number.');return;}
    UI.fq=q;
    const f=Data.orders.find(o=>String(o.soNo).toLowerCase().includes(q.toLowerCase()));
    if(!f){Toast.err(`No orders for "${q}"`);return;}
    UI.selSO=f.soNo; P.factory(U.$('main'));
  },

  confirmSend() {
    openModal('Confirm Send to Factory', `
      <div style="text-align:center">
        <div style="font-size:52px;margin-bottom:12px">🏭</div>
        <p style="color:var(--txt2);margin-bottom:22px">Mark all items in <strong style="color:#fff">S.O ${U.e(UI.selSO)}</strong> as delivered and print?</p>
        <div class="brow" style="justify-content:center">
          <button class="bs" onclick="closeModal()">Cancel</button>
          <button class="bs bg" onclick="A._doSend()">Confirm & Print</button>
        </div>
      </div>`);
  },
  async _doSend() {
    closeModal(); Ldr.show('Saving…');
    try {
      const items=Data.orders.filter(o=>String(o.soNo)===String(UI.selSO));
      for(const o of items) await Data.markDelivered(o);
      Toast.ok('Marked as delivered!'); setTimeout(()=>this.printRcpt(),350);
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  printRcpt() {
    const dom=document.getElementById('rcpt-dom');
    if(!dom){Toast.err('No receipt loaded.');return;}
    const fonts='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@400;500&family=Great+Vibes&family=Tajawal:wght@400;500;700&display=swap';
    const css=document.querySelector('style')?.textContent||'';
    const w=window.open('','_blank','width=900,height=720');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="${fonts}" rel="stylesheet">
    <style>${css}body{background:#fff;padding:32px}@media print{@page{size:A4;margin:12mm 10mm}body{padding:0}}</style>
    </head><body>${dom.outerHTML}<script>window.onload=function(){window.print();window.onafterprint=function(){window.close()}};<\/script></body></html>`);
    w.document.close();
  },

  budgetAdd() {
    const supps=[...new Set(Data.orders.map(o=>o.supplier).filter(Boolean))];
    openModal('Add Budget Item', `
      <div class="fg">
        <div class="fi"><label>S.O No</label><input id="bm-so" placeholder="4462"></div>
        <div class="fi"><label>Date</label><input id="bm-d" type="date" value="${today()}"></div>
        <div class="fi"><label>Fabric Code</label><input id="bm-fc" placeholder="KARLA 2"></div>
        <div class="fi"><label>Supplier</label><input id="bm-s" list="bm-sl" placeholder="Supplier…"><datalist id="bm-sl">${supps.map(s=>`<option value="${U.e(s)}">`).join('')}</datalist></div>
        <div class="fi"><label>Quantity (m)</label><input id="bm-q" type="number" placeholder="0" min="0"></div>
        <div class="fi"><label>Buy Price / m</label><input id="bm-p" type="number" placeholder="0.00" step="0.01"></div>
        <div class="ff fi"><label>Notes</label><input id="bm-n" placeholder="Optional…"></div>
      </div>
      <div class="brow" style="margin-top:18px">
        <button class="bs" onclick="closeModal()">Cancel</button>
        <button class="bs bg" onclick="A._addBudget()">Add Item</button>
      </div>`);
  },
  async _addBudget() {
    const fc=U.val('bm-fc'); if(!fc){Toast.err('Fabric Code required.');return;}
    closeModal(); Ldr.show('Saving…');
    try {
      await Data.addBudget({soNo:U.val('bm-so'),date:U.val('bm-d'),fabCode:fc,supplier:U.val('bm-s'),qty:parseFloat(U.val('bm-q'))||0,buyPrice:parseFloat(U.val('bm-p'))||0,notes:U.val('bm-n')});
      Toast.ok('Budget item added!'); P.budget(U.$('main'));
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  async delBudget(id) {
    Ldr.show('Removing…');
    try {
      const i=Data.budget.find(x=>x.id===id); if(!i)return;
      await Data.deleteBudget(i); Toast.ok('Removed.'); P.budget(U.$('main'));
    } catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  clearBudget() {
    openModal('Clear Budget?', `
      <p style="color:var(--txt2);margin-bottom:18px">Remove all ${Data.budget.length} items?</p>
      <div class="brow">
        <button class="bs" onclick="closeModal()">Cancel</button>
        <button class="bs bd" style="color:var(--red)" onclick="A._clearBudget()">Clear All</button>
      </div>`);
  },
  async _clearBudget() {
    closeModal(); Ldr.show('Clearing…');
    try { await Data.clearBudget(); Toast.ok('Budget cleared.'); P.budget(U.$('main')); }
    catch(e){Toast.err(e.message);} finally{Ldr.hide();}
  },

  copyBudget() {
    const hd=['S.O No','Date','Fabric Code','Supplier','Qty','Buy/m','Total'];
    const rs=Data.budget.map(i=>{const t=(+i.qty||0)*(+i.buyPrice||0);return[i.soNo,i.date,i.fabCode,i.supplier,i.qty,i.buyPrice,t.toFixed(2)].join('\t');});
    navigator.clipboard.writeText([hd.join('\t'),...rs].join('\n')).then(()=>Toast.ok('Copied!')).catch(()=>Toast.err('Failed'));
  },

  printBudget() {
    const q=(UI.bq||'').toLowerCase();
    const list=Data.budget.filter(i=>!q||[i.soNo,i.fabCode,i.supplier].some(v=>String(v).toLowerCase().includes(q)));
    const sub=list.reduce((a,i)=>a+(+i.qty||0)*(+i.buyPrice||0),0);
    const vat=UI.useVAT?sub*0.14:0, grand=sub+vat;
    const w=window.open('','_blank','width=900,height=700');
    w.document.write(R.budgetPrint(list,sub,vat,grand)); w.document.close();
  },
};

window.addEventListener('DOMContentLoaded', () => {
  showScreen('login');
  Auth.init();
});
</script>
